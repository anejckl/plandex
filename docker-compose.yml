services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plandex}
      POSTGRES_USER: ${POSTGRES_USER:-plandex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (see .env.example)}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plandex} -d ${POSTGRES_DB:-plandex}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    ports:
      - "5000:5000"
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-plandex};Username=${POSTGRES_USER:-plandex};Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required (see .env.example)}
      Jwt__Issuer: "plandex"
      ASPNETCORE_URLS: "http://+:5000"
      ASPNETCORE_ENVIRONMENT: "Production"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  pgdata:
